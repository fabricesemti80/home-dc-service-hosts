services:
  docktail:
    image: ghcr.io/marvinvr/docktail:latest
    networks:
      - homelab_proxy_swarm
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/run/tailscale:/var/run/tailscale
    environment:
      TAILSCALE_OAUTH_CLIENT_ID: ${TAILSCALE_OAUTH_CLIENT_ID}
      TAILSCALE_OAUTH_CLIENT_SECRET: ${TAILSCALE_OAUTH_CLIENT_SECRET}
    deploy:
      mode: global
      restart_policy:
        condition: any

  technitium-0:
    image: docker.io/technitium/dns-server:latest
    hostname: dns-server-0
    networks:
      - homelab_proxy_swarm
    ports:
      - target: 53
        published: 53
        protocol: tcp
        mode: host
      - target: 53
        published: 53
        protocol: udp
        mode: host
      - target: 53443
        published: 53443
        protocol: tcp
        mode: host
      - target: 5380
        published: 5380
        protocol: tcp
        mode: host
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
    environment:
      DNS_SERVER_DOMAIN: dns-server-0
      DNS_SERVER_ADMIN_PASSWORD: ${TECHNITIUM_ADMIN_PASSWORD}
      DNS_SERVER_WEB_SERVICE_LOCAL_ADDRESSES: 0.0.0.0
      DNS_SERVER_WEB_SERVICE_HTTP_PORT: "5380"
      DNS_SERVER_WEB_SERVICE_ENABLE_HTTPS: "false"
    volumes:
      - technitium_0_data:/etc/dns
    deploy:
      placement:
        constraints:
          - node.hostname == docker-svc-0
      restart_policy:
        condition: any
    labels:
      docktail.service.enable: "true"
      docktail.service.direct: "false"
      docktail.service.name: technitium-0
      docktail.service.port: "5380"
      docktail.service.service-port: "443"
      docktail.service.protocol: http
      homepage.group: Infrastructure
      homepage.name: Technitium Primary
      homepage.icon: mdi-dns
      homepage.href: https://technitium-0.koala-dominant.ts.net

  technitium-1:
    image: docker.io/technitium/dns-server:latest
    hostname: dns-server-1
    networks:
      - homelab_proxy_swarm
    ports:
      - target: 53
        published: 53
        protocol: tcp
        mode: host
      - target: 53
        published: 53
        protocol: udp
        mode: host
      - target: 53443
        published: 53443
        protocol: tcp
        mode: host
      - target: 5380
        published: 5380
        protocol: tcp
        mode: host
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
    environment:
      DNS_SERVER_DOMAIN: dns-server-1
      DNS_SERVER_ADMIN_PASSWORD: ${TECHNITIUM_ADMIN_PASSWORD}
      DNS_SERVER_WEB_SERVICE_LOCAL_ADDRESSES: 0.0.0.0
      DNS_SERVER_WEB_SERVICE_HTTP_PORT: "5380"
      DNS_SERVER_WEB_SERVICE_ENABLE_HTTPS: "false"
    volumes:
      - technitium_1_data:/etc/dns
    deploy:
      placement:
        constraints:
          - node.hostname == sentinel-1
      restart_policy:
        condition: any
    labels:
      docktail.service.enable: "true"
      docktail.service.direct: "false"
      docktail.service.name: technitium-1
      docktail.service.port: "5380"
      docktail.service.service-port: "443"
      docktail.service.protocol: http
      homepage.group: Infrastructure
      homepage.name: Technitium Secondary
      homepage.icon: mdi-dns
      homepage.href: https://technitium-1.koala-dominant.ts.net

networks:
  homelab_proxy_swarm:
    external: true

volumes:
  technitium_0_data:
    name: technitium_data
    external: true
  technitium_1_data:
    name: docker_apps_technitium_data
    external: true
