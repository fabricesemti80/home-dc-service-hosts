services:
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    networks:
      - homelab_proxy_swarm
    volumes:
      - /srv/docker/uptime-kuma/data:/app/data
    ports:
      - target: 3001
        published: 13001
        protocol: tcp
        mode: host
    deploy:
      placement:
        constraints:
          - node.hostname == ${PULSE_HOSTNAME}
      restart_policy:
        condition: any
    labels:
      docktail.service.enable: "true"
      docktail.service.direct: "false"
      docktail.service.name: uptime-kuma
      docktail.service.port: "3001"
      docktail.service.service-port: "443"
      docktail.service.protocol: http
      homepage.group: Monitoring
      homepage.name: Uptime Kuma
      homepage.icon: uptime-kuma
      homepage.href: https://uptime-kuma.koala-dominant.ts.net

  pulse:
    image: rcourtman/pulse:latest
    volumes:
      - /srv/docker/pulse/data:/data
    environment:
      TZ: Europe/London
      NODE_NAME: pulse-server
      PULSE_AGENT_URL: ${PULSE_AGENT_URL}
    networks:
      - homelab_proxy_swarm
    ports:
      - target: 7655
        published: 17655
        protocol: tcp
        mode: host
    deploy:
      placement:
        constraints:
          - node.hostname == ${PULSE_HOSTNAME}
      restart_policy:
        condition: any
    labels:
      docktail.service.enable: "true"
      docktail.service.direct: "false"
      docktail.service.name: pulse
      docktail.service.port: "7655"
      docktail.service.service-port: "443"
      docktail.service.protocol: http
      homepage.group: Monitoring
      homepage.name: Pulse
      homepage.icon: mdi-pulse
      homepage.href: https://pulse.koala-dominant.ts.net

networks:
  homelab_proxy_swarm:
    external: true
