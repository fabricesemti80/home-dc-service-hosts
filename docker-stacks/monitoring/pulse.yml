version: '3.8'

services:
  pulse:
    image: rcourtman/pulse:latest
    container_name: pulse
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    environment:
      - TZ=Europe/London
      - NODE_NAME=${HOSTNAME:-pulse-server}
    networks:
      - monitoring-net

networks:
  monitoring-net:
    driver: bridge
