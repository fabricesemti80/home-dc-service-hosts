services:
  vaultwarden:
    image: vaultwarden/server:latest
    networks:
      - homelab_proxy_swarm
    environment:
      DOMAIN: ${VAULTWARDEN_APP_URL:-https://vaultwarden.koala-dominant.ts.net}
      ADMIN_TOKEN: ${VAULTWARDEN_ADMIN_TOKEN}
    volumes:
      - vaultwarden_data:/data
    ports:
      - target: 80
        published: 18080
        protocol: tcp
        mode: host
    deploy:
      placement:
        constraints:
          - node.hostname == docker-svc-1
      restart_policy:
        condition: any
    labels:
      docktail.service.enable: "true"
      docktail.service.direct: "false"
      docktail.service.name: vaultwarden
      docktail.service.port: "80"
      docktail.service.service-port: "443"
      docktail.service.protocol: http
      homepage.group: Apps
      homepage.name: Vaultwarden
      homepage.icon: bitwarden
      homepage.href: https://vaultwarden.koala-dominant.ts.net

  beszel:
    image: henrygd/beszel:latest
    networks:
      - homelab_proxy_swarm
    environment:
      APP_URL: ${BESZEL_APP_URL:-https://beszel.koala-dominant.ts.net}
    volumes:
      - beszel_data:/beszel_data
    ports:
      - target: 8090
        published: 18090
        protocol: tcp
        mode: host
    deploy:
      placement:
        constraints:
          - node.hostname == docker-svc-1
      restart_policy:
        condition: any
    labels:
      docktail.service.enable: "true"
      docktail.service.direct: "false"
      docktail.service.name: beszel
      docktail.service.port: "8090"
      docktail.service.service-port: "443"
      docktail.service.protocol: http
      homepage.group: Monitoring
      homepage.name: Beszel
      homepage.icon: mdi-chart-line
      homepage.href: https://beszel.koala-dominant.ts.net

  beszel-agent:
    image: henrygd/beszel-agent:latest
    environment:
      LISTEN: "45876"
      KEY: ${BESZEL_AGENT_KEY}
    ports:
      - target: 45876
        published: 45876
        protocol: tcp
        mode: host
    volumes:
      - beszel_agent_data:/var/lib/beszel-agent
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      mode: global
      restart_policy:
        condition: any

  uptime-kuma:
    image: louislam/uptime-kuma:latest
    networks:
      - homelab_proxy_swarm
    volumes:
      - uptime_kuma_data:/app/data
    ports:
      - target: 3001
        published: 13001
        protocol: tcp
        mode: host
    deploy:
      placement:
        constraints:
          - node.hostname == docker-svc-1
      restart_policy:
        condition: any
    labels:
      docktail.service.enable: "true"
      docktail.service.direct: "false"
      docktail.service.name: uptime-kuma
      docktail.service.port: "3001"
      docktail.service.service-port: "443"
      docktail.service.protocol: http
      homepage.group: Monitoring
      homepage.name: Uptime Kuma
      homepage.icon: uptime-kuma
      homepage.href: https://uptime-kuma.koala-dominant.ts.net

  whoami:
    image: traefik/whoami:latest
    networks:
      - homelab_proxy_swarm
    ports:
      - target: 80
        published: 18081
        protocol: tcp
        mode: host
    deploy:
      placement:
        constraints:
          - node.hostname == docker-svc-1
      restart_policy:
        condition: any
    labels:
      docktail.service.enable: "true"
      docktail.service.direct: "false"
      docktail.service.name: whoami
      docktail.service.port: "80"
      docktail.service.service-port: "443"
      docktail.service.protocol: http
      homepage.group: Infrastructure
      homepage.name: Whoami
      homepage.icon: mdi-question-mark
      homepage.href: https://whoami.koala-dominant.ts.net

volumes:
  vaultwarden_data:
    name: docker_apps_vaultwarden_data
    external: true
  beszel_data:
    name: docker_apps_beszel_data
    external: true
  beszel_agent_data:
    name: docker_apps_beszel_agent_data
  uptime_kuma_data:
    name: docker_apps_uptime_kuma_data
    external: true

networks:
  homelab_proxy_swarm:
    external: true
