name: homelab

services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    networks:
      - homelab_proxy
    environment:
      DOMAIN: ${VAULTWARDEN_APP_URL:-https://vaultwarden.koala-dominant.ts.net}
      ADMIN_TOKEN: ${VAULTWARDEN_ADMIN_TOKEN}
    volumes:
      - vaultwarden_data:/data
    labels:
      docktail.service.enable: "true"
      docktail.service.name: vaultwarden
      docktail.service.port: "80"
      docktail.service.service-port: "443"
      docktail.service.protocol: http

  beszel:
    image: henrygd/beszel:latest
    container_name: beszel
    restart: unless-stopped
    networks:
      - homelab_proxy
    environment:
      APP_URL: ${BESZEL_APP_URL:-https://beszel.koala-dominant.ts.net}
    volumes:
      - beszel_data:/beszel_data
      - beszel_socket:/beszel_socket
    labels:
      docktail.service.enable: "true"
      docktail.service.name: beszel
      docktail.service.port: "8090"
      docktail.service.service-port: "443"
      docktail.service.protocol: http

  beszel-agent:
    image: henrygd/beszel-agent:latest
    container_name: beszel-agent
    restart: unless-stopped
    network_mode: host
    environment:
      LISTEN: /beszel_socket/beszel.sock
      KEY: ${BESZEL_AGENT_KEY}
    volumes:
      - beszel_agent_data:/var/lib/beszel-agent
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - beszel_socket:/beszel_socket

volumes:
  vaultwarden_data:
    name: docker_apps_vaultwarden_data
  beszel_data:
    name: docker_apps_beszel_data
  beszel_agent_data:
    name: docker_apps_beszel_agent_data
  beszel_socket:
    name: docker_apps_beszel_socket
