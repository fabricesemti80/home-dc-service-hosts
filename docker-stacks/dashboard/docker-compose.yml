services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    environment:
      HOMEPAGE_ALLOWED_HOSTS: start.koala-dominant.ts.net
    networks:
      - homelab_proxy_swarm
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - target: 3000
        published: 13000
        protocol: tcp
        mode: host
    configs:
      - source: homepage_settings
        target: /app/config/settings.yaml
      - source: homepage_docker
        target: /app/config/docker.yaml
      - source: homepage_bookmarks
        target: /app/config/bookmarks.yaml
      - source: homepage_services
        target: /app/config/services.yaml
    deploy:
      placement:
        constraints:
          - node.hostname == docker-svc-1
      restart_policy:
        condition: any
    labels:
      docktail.service.enable: "true"
      docktail.service.direct: "false"
      docktail.service.name: start
      docktail.service.port: "3000"
      docktail.service.service-port: "443"
      docktail.service.protocol: http
      homepage.group: Dashboard
      homepage.name: Homelab Dash
      homepage.icon: homepage
      homepage.href: https://start.koala-dominant.ts.net

networks:
  homelab_proxy_swarm:
    external: true

configs:
  homepage_settings:
    file: docker-stacks/dashboard/config/settings.yaml
  homepage_docker:
    file: docker-stacks/dashboard/config/docker.yaml
  homepage_bookmarks:
    file: docker-stacks/dashboard/config/bookmarks.yaml
  homepage_services:
    file: docker-stacks/dashboard/config/services.yaml
