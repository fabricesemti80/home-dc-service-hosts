services:
  docktail:
    image: ghcr.io/marvinvr/docktail:latest
    container_name: docktail
    restart: unless-stopped
    networks:
      - homelab_proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/run/tailscale:/var/run/tailscale

  whoami:
    image: traefik/whoami:latest
    container_name: whoami
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    networks:
      - homelab_proxy
    labels:
      docktail.service.enable: "true"
      docktail.service.name: whoami
      docktail.service.port: "80"
      docktail.service.service-port: "443"
      docktail.service.protocol: http
      homepage.group: Infrastructure
      homepage.name: Whoami
      homepage.icon: mdi-question-mark
      homepage.href: https://whoami.koala-dominant.ts.net

  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    networks:
      - homelab_proxy
    volumes:
      - docker_apps_uptime_kuma_data:/app/data
    labels:
      docktail.service.enable: "true"
      docktail.service.name: uptime-kuma
      docktail.service.port: "3001"
      docktail.service.service-port: "443"
      docktail.service.protocol: http
      homepage.group: Monitoring
      homepage.name: Uptime Kuma
      homepage.icon: uptime-kuma
      homepage.href: https://uptime-kuma.koala-dominant.ts.net

  technitium:
    image: docker.io/technitium/dns-server:latest
    container_name: technitium
    hostname: dns-server
    restart: unless-stopped
    networks:
      - homelab_proxy
    ports:
      - target: 53
        published: 53
        protocol: tcp
        mode: host
      - target: 53
        published: 53
        protocol: udp
        mode: host
      - target: 53443
        published: 53443
        protocol: tcp
        mode: host
      - target: 5380
        published: 5380
        protocol: tcp
        mode: host
    environment:
      DNS_SERVER_DOMAIN: dns-server
      DNS_SERVER_ADMIN_PASSWORD: ${TECHNITIUM_ADMIN_PASSWORD}
      DNS_SERVER_WEB_SERVICE_LOCAL_ADDRESSES: 0.0.0.0
      DNS_SERVER_WEB_SERVICE_HTTP_PORT: "5380"
      DNS_SERVER_WEB_SERVICE_ENABLE_HTTPS: "false"
    volumes:
      - technitium_data:/etc/dns
    labels:
      docktail.service.enable: "true"
      docktail.service.name: technitium-0
      docktail.service.port: "5380"
      docktail.service.service-port: "443"
      docktail.service.protocol: http
      homepage.group: Infrastructure
      homepage.name: Technitium Primary
      homepage.icon: mdi-dns
      homepage.href: https://technitium-0.koala-dominant.ts.net

  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    networks:
      - homelab_proxy
    environment:
      DOMAIN: ${VAULTWARDEN_APP_URL:-https://vaultwarden.koala-dominant.ts.net}
      ADMIN_TOKEN: ${VAULTWARDEN_ADMIN_TOKEN}
    volumes:
      - vaultwarden_data:/data
    labels:
      docktail.service.enable: "true"
      docktail.service.name: vaultwarden
      docktail.service.port: "80"
      docktail.service.service-port: "443"
      docktail.service.protocol: http
      homepage.group: Apps
      homepage.name: Vaultwarden
      homepage.icon: bitwarden
      homepage.href: https://vaultwarden.koala-dominant.ts.net

  beszel:
    image: henrygd/beszel:latest
    container_name: beszel
    restart: unless-stopped
    networks:
      - homelab_proxy
    environment:
      APP_URL: ${BESZEL_APP_URL:-https://beszel.koala-dominant.ts.net}
    volumes:
      - beszel_data:/beszel_data
    labels:
      docktail.service.enable: "true"
      docktail.service.name: beszel
      docktail.service.port: "8090"
      docktail.service.service-port: "443"
      docktail.service.protocol: http
      homepage.group: Monitoring
      homepage.name: Beszel
      homepage.icon: mdi-chart-line
      homepage.href: https://beszel.koala-dominant.ts.net

  beszel-agent:
    image: henrygd/beszel-agent:latest
    container_name: beszel-agent
    restart: unless-stopped
    network_mode: host
    environment:
      LISTEN: "45876"
      KEY: ${BESZEL_AGENT_KEY}
    volumes:
      - beszel_agent_data:/var/lib/beszel-agent
      - /var/run/docker.sock:/var/run/docker.sock:ro

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    depends_on:
      homepage-config:
        condition: service_completed_successfully
    environment:
      HOMEPAGE_ALLOWED_HOSTS: start.koala-dominant.ts.net
    networks:
      - homelab_proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - homepage_config:/app/config
    labels:
      docktail.service.enable: "true"
      docktail.service.name: start
      docktail.service.port: "3000"
      docktail.service.service-port: "443"
      docktail.service.protocol: http
      homepage.group: Dashboard
      homepage.name: Homelab Dash
      homepage.icon: homepage
      homepage.href: https://start.koala-dominant.ts.net

  homepage-config:
    image: alpine:latest
    container_name: homepage-config
    restart: "no"
    volumes:
      - homepage_config:/config
    command:
      - sh
      - -c
      - |
        cat > /config/settings.yaml <<'EOF'
        title: Homelab Dashboard
        favicon: https://tailscale.com/favicon.ico
        color: slate
        theme: dark
        EOF
        cat > /config/docker.yaml <<'EOF'
        my-docker:
          socket: /var/run/docker.sock
        EOF
        cat > /config/bookmarks.yaml <<'EOF'
        ---
        EOF
        cat > /config/services.yaml <<'EOF'
        ---
        - Homelab:
            - Portainer:
                icon: portainer
                href: https://portainer.koala-dominant.ts.net
            - Uptime Kuma:
                icon: uptime-kuma
                href: https://uptime-kuma.koala-dominant.ts.net
            - Vaultwarden:
                icon: vaultwarden
                href: https://vaultwarden.koala-dominant.ts.net
            - Beszel:
                icon: beszel
                href: https://beszel.koala-dominant.ts.net
            - Technitium:
                icon: technitium
                href: https://technitium-0.koala-dominant.ts.net
            - Pulse:
                icon: mdi-pulse
                href: https://pulse.koala-dominant.ts.net
            - Whoami:
                icon: mdi-test-tube
                href: https://whoami.koala-dominant.ts.net
        EOF

  pulse:
    image: rcourtman/pulse:latest
    container_name: pulse
    restart: always
    volumes:
      - ./docker-stacks/monitoring/data:/app/data
    environment:
      TZ: Europe/London
      NODE_NAME: ${HOSTNAME:-pulse-server}
    networks:
      - homelab_proxy
    labels:
      docktail.service.enable: "true"
      docktail.service.name: pulse
      docktail.service.port: "7655"
      docktail.service.service-port: "443"
      docktail.service.protocol: http
      homepage.group: Monitoring
      homepage.name: Pulse
      homepage.icon: mdi-pulse
      homepage.href: https://pulse.koala-dominant.ts.net

networks:
  homelab_proxy:
    name: homelab_proxy
    external: true

volumes:
  homepage_config:
    name: homelab_homepage_config
  docker_apps_uptime_kuma_data:
    name: docker_apps_uptime_kuma_data
    external: true
  technitium_data:
    name: technitium_data
    external: true
  vaultwarden_data:
    name: docker_apps_vaultwarden_data
    external: true
  beszel_data:
    name: docker_apps_beszel_data
    external: true
  beszel_agent_data:
    name: docker_apps_beszel_agent_data
    external: true
