---
- name: Install Debian base packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - sudo
      - vim
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Ensure locale is generated
  ansible.builtin.locale_gen:
    name: en_US.UTF-8
    state: present

- name: Set system locale
  ansible.builtin.copy:
    dest: /etc/default/locale
    content: |
      LANG=en_US.UTF-8
      LC_ALL=en_US.UTF-8
    mode: "0644"
  when: ansible_facts['env']['LANG'] | default('') != 'en_US.UTF-8'

- name: Ensure hostname matches inventory
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"
  when: ansible_facts['hostname'] != inventory_hostname

- name: Ensure /etc/hostname matches inventory
  ansible.builtin.copy:
    dest: /etc/hostname
    content: "{{ inventory_hostname }}\n"
    mode: "0644"
  notify: Reboot host

- name: Configure static network address
  ansible.builtin.copy:
    dest: /etc/systemd/network/10-ansible-static.network
    mode: "0644"
    content: |
      [Match]
      Name={{ debian_base_static_ipv4_interface | default(ansible_facts.default_ipv4.interface) }}

      [Network]
      Address={{ debian_base_static_ipv4_address }}
      Gateway={{ debian_base_static_ipv4_gateway }}
  when: debian_base_static_ipv4_address is defined
  notify: Reboot host

- name: Enable systemd-networkd for static network
  ansible.builtin.systemd:
    name: systemd-networkd
    enabled: true
  when: debian_base_static_ipv4_address is defined

- name: Disable ifupdown networking for static network
  ansible.builtin.systemd:
    name: networking
    enabled: false
  when: debian_base_static_ipv4_address is defined
  failed_when: false

- name: Disable NetworkManager for static network
  ansible.builtin.systemd:
    name: NetworkManager
    enabled: false
  when: debian_base_static_ipv4_address is defined
  failed_when: false

- name: Set root password from environment
  ansible.builtin.user:
    name: root
    password: "{{ lookup('ansible.builtin.env', 'ANSI_ROOT_PASSWORD') | password_hash('sha512', 'proxmoxguest') }}"
  when: lookup('ansible.builtin.env', 'ANSI_ROOT_PASSWORD') | length > 0
  no_log: true

- name: Set timezone file
  ansible.builtin.copy:
    dest: /etc/timezone
    mode: "0644"
    content: "{{ debian_base_timezone | default('Europe/London') }}\n"

- name: Link localtime
  ansible.builtin.file:
    src: "/usr/share/zoneinfo/{{ debian_base_timezone | default('Europe/London') }}"
    dest: /etc/localtime
    state: link
    force: true

- name: Create journald config directory
  ansible.builtin.file:
    path: /etc/systemd/journald.conf.d
    state: directory
    mode: "0755"

- name: Limit journal disk usage
  ansible.builtin.copy:
    dest: /etc/systemd/journald.conf.d/limits.conf
    mode: "0644"
    content: |
      [Journal]
      SystemMaxUse={{ debian_base_journal_system_max_use | default('512M') }}
      RuntimeMaxUse={{ debian_base_journal_runtime_max_use | default('128M') }}

- name: Mask suspend targets
  ansible.builtin.systemd:
    name: "{{ item }}"
    masked: true
  loop:
    - systemd-suspend.service
    - systemd-hibernate.service
    - systemd-hybrid-sleep.service
    - sleep.target
    - suspend.target
    - hibernate.target
    - hybrid-sleep.target
  when: debian_base_disable_suspend | default(true) | bool

- name: Configure logind to ignore power and lid events
  ansible.builtin.lineinfile:
    path: /etc/systemd/logind.conf
    regexp: "^{{ item.key }}="
    line: "{{ item.key }}={{ item.value }}"
  loop:
    - { key: "HandlePowerKey", value: "ignore" }
    - { key: "HandleLidSwitch", value: "ignore" }
    - { key: "HandleLidSwitchExternalPower", value: "ignore" }
    - { key: "HandleLidSwitchDocked", value: "ignore" }
    - { key: "IdleAction", value: "ignore" }
  when: debian_base_disable_suspend | default(true) | bool
  notify: Restart systemd-logind
