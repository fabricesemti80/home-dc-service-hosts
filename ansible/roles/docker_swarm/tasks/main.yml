---
- name: Validate swarm inventory
  ansible.builtin.assert:
    that:
      - groups['docker_swarm_managers'] | length == 1
      - groups['docker_swarm_workers'] | length >= 1
    fail_msg: "Use exactly one swarm manager and at least one worker."

- name: Set swarm manager host
  ansible.builtin.set_fact:
    docker_swarm_manager_host: "{{ groups['docker_swarm_managers'][0] }}"

- name: Ensure containerd root exists
  ansible.builtin.file:
    path: "{{ containerd_root }}"
    state: directory
    mode: "0711"
  when: containerd_root is defined

- name: Configure containerd root
  ansible.builtin.copy:
    dest: /etc/containerd/config.toml
    mode: "0644"
    content: |
      disabled_plugins = ["cri"]
      root = "{{ containerd_root }}"
      state = "/run/containerd"
  register: containerd_config
  when: containerd_root is defined

- name: Restart containerd for root change
  ansible.builtin.service:
    name: containerd
    state: restarted
  when: containerd_config.changed | default(false)

- name: Restart docker for containerd root change
  ansible.builtin.service:
    name: docker
    state: restarted
  when: containerd_config.changed | default(false)

- name: Ensure Docker systemd override directory exists
  ansible.builtin.file:
    path: /etc/systemd/system/docker.service.d
    state: directory
    mode: "0755"
  when: docker_daemon_options is defined

- name: Ensure Docker loads daemon config file
  ansible.builtin.copy:
    dest: /etc/systemd/system/docker.service.d/10-config-file.conf
    mode: "0644"
    content: |
      [Service]
      ExecStart=
      ExecStart=/usr/bin/dockerd --config-file=/etc/docker/daemon.json -H fd:// --containerd=/run/containerd/containerd.sock
  register: docker_config_file_override
  when: docker_daemon_options is defined

- name: Reload systemd for Docker config override
  ansible.builtin.systemd:
    daemon_reload: true
  when: docker_config_file_override.changed | default(false)

- name: Restart Docker for config override
  ansible.builtin.service:
    name: docker
    state: restarted
  when: docker_config_file_override.changed | default(false)

- name: Ensure Pulse data directory exists on monitoring host
  ansible.builtin.file:
    path: "{{ pulse_data_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: monitoring_stack_host | default(false)

- name: Check local swarm state
  ansible.builtin.command: docker info --format '{{ "{{.Swarm.LocalNodeState}}" }} {{ "{{.Swarm.ControlAvailable}}" }}'
  register: docker_swarm_state
  changed_when: false

- name: Find existing swarm manager
  ansible.builtin.set_fact:
    docker_swarm_existing_manager_host: "{{ item }}"
  loop: "{{ ansible_play_hosts }}"
  when:
    - not ansible_check_mode
    - hostvars[item].docker_swarm_state.stdout.split()[1] == "true"
  run_once: true

- name: Initialize swarm on manager
  ansible.builtin.command: >-
    docker swarm init
    --advertise-addr {{ docker_swarm_advertise_addr | default(ansible_host) }}
    --listen-addr {{ docker_swarm_listen_addr }}
  when:
    - not ansible_check_mode
    - inventory_hostname == docker_swarm_manager_host
    - docker_swarm_state.stdout.split()[0] == "inactive"
    - docker_swarm_existing_manager_host is not defined

- name: Read manager join token
  ansible.builtin.command: docker swarm join-token -q manager
  register: docker_swarm_manager_token
  changed_when: false
  run_once: true
  delegate_to: "{{ docker_swarm_existing_manager_host | default(docker_swarm_manager_host) }}"
  when:
    - not ansible_check_mode
    - docker_swarm_existing_manager_host is defined
    - hostvars[docker_swarm_manager_host].docker_swarm_state.stdout.split()[0] == "inactive"

- name: Join desired manager to existing swarm
  ansible.builtin.command: >-
    docker swarm join
    --token {{ docker_swarm_manager_token.stdout }}
    {{ hostvars[docker_swarm_existing_manager_host].docker_swarm_advertise_addr | default(hostvars[docker_swarm_existing_manager_host].ansible_host) }}:{{ docker_swarm_port }}
  when:
    - not ansible_check_mode
    - inventory_hostname == docker_swarm_manager_host
    - docker_swarm_existing_manager_host is defined
    - docker_swarm_state.stdout.split()[0] == "inactive"

- name: Read worker join token
  ansible.builtin.command: docker swarm join-token -q worker
  register: docker_swarm_worker_token
  changed_when: false
  run_once: true
  delegate_to: "{{ docker_swarm_manager_host }}"

- name: Join workers to swarm
  ansible.builtin.command: >-
    docker swarm join
    --token {{ docker_swarm_worker_token.stdout }}
    {{ hostvars[docker_swarm_manager_host].docker_swarm_advertise_addr | default(hostvars[docker_swarm_manager_host].ansible_host) }}:{{ docker_swarm_port }}
  when:
    - not ansible_check_mode
    - inventory_hostname in groups['docker_swarm_workers']
    - docker_swarm_state.stdout.split()[0] == "inactive"

- name: Demote managers listed as workers
  ansible.builtin.command: "docker node demote {{ inventory_hostname }}"
  when:
    - not ansible_check_mode
    - inventory_hostname in groups['docker_swarm_workers']
    - docker_swarm_state.stdout.split()[1] == "true"
  delegate_to: "{{ docker_swarm_manager_host }}"

- name: Check swarm overlay network
  ansible.builtin.command: "docker network inspect {{ docker_swarm_overlay_network }}"
  register: docker_swarm_overlay_network_check
  changed_when: false
  failed_when: docker_swarm_overlay_network_check.rc not in [0, 1]
  run_once: true
  delegate_to: "{{ docker_swarm_manager_host }}"

- name: Create swarm overlay network
  ansible.builtin.command: "docker network create --driver overlay --attachable {{ docker_swarm_overlay_network }}"
  when:
    - not ansible_check_mode
    - docker_swarm_overlay_network_check.rc == 1
  run_once: true
  delegate_to: "{{ docker_swarm_manager_host }}"

- name: Show swarm nodes
  ansible.builtin.command: docker node ls
  register: docker_swarm_nodes
  changed_when: false
  run_once: true
  delegate_to: "{{ docker_swarm_manager_host }}"

- name: Print swarm nodes
  ansible.builtin.debug:
    var: docker_swarm_nodes.stdout_lines
  run_once: true
