---
- name: Create Komodo directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ komodo_root }}"
    - "{{ komodo_root }}/backups"
    - "{{ komodo_root }}/mongo-data"
    - "{{ komodo_root }}/mongo-config"
    - "{{ komodo_config_root }}"

- name: Validate Komodo environment secrets
  ansible.builtin.assert:
    that:
      - lookup('ansible.builtin.env', 'KOMODO_DATABASE_PASSWORD') | length > 0
      - lookup('ansible.builtin.env', 'KOMODO_INIT_ADMIN_PASSWORD') | length > 0
      - lookup('ansible.builtin.env', 'KOMODO_WEBHOOK_SECRET') | length > 0
      - lookup('ansible.builtin.env', 'KOMODO_JWT_SECRET') | length > 0
      - lookup('ansible.builtin.env', 'KOMODO_API_KEY') | length > 0
      - lookup('ansible.builtin.env', 'KOMODO_API_SECRET') | length > 0
    fail_msg: "KOMODO_DATABASE_PASSWORD, KOMODO_INIT_ADMIN_PASSWORD, KOMODO_WEBHOOK_SECRET, KOMODO_JWT_SECRET, KOMODO_API_KEY, and KOMODO_API_SECRET are required."
  no_log: true

- name: Render Komodo env file
  ansible.builtin.template:
    src: compose.env.j2
    dest: "{{ komodo_root }}/compose.env"
    mode: "0600"
  no_log: true

- name: Render Komodo compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ komodo_root }}/docker-compose.yml"
    mode: "0644"

- name: Deploy Komodo
  ansible.builtin.command:
    cmd: docker compose --env-file compose.env up -d --remove-orphans
    chdir: "{{ komodo_root }}"
  register: komodo_compose_up
  changed_when: "'Started' in komodo_compose_up.stdout or 'Created' in komodo_compose_up.stdout or 'Recreated' in komodo_compose_up.stdout or 'Running' in komodo_compose_up.stdout"

- name: Wait for Komodo API
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ komodo_port }}/read/ListFullResourceSyncs"
    method: POST
    body_format: json
    body: {}
    headers:
      X-Api-Key: "{{ lookup('ansible.builtin.env', 'KOMODO_API_KEY') }}"
      X-Api-Secret: "{{ lookup('ansible.builtin.env', 'KOMODO_API_SECRET') }}"
    status_code: 200
  register: komodo_syncs
  retries: 30
  delay: 2
  until: komodo_syncs.status == 200
  when: not ansible_check_mode
  no_log: true

- name: Create Komodo resource sync
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ komodo_port }}/write/CreateResourceSync"
    method: POST
    body_format: json
    body:
      name: "{{ komodo_resource_sync_name }}"
      config:
        repo: "{{ komodo_resource_sync_repo }}"
        branch: "{{ komodo_resource_sync_branch }}"
        resource_path: "{{ komodo_resource_sync_paths }}"
    headers:
      X-Api-Key: "{{ lookup('ansible.builtin.env', 'KOMODO_API_KEY') }}"
      X-Api-Secret: "{{ lookup('ansible.builtin.env', 'KOMODO_API_SECRET') }}"
    status_code: 200
  when:
    - not ansible_check_mode
    - komodo_syncs.json | selectattr('name', 'equalto', komodo_resource_sync_name) | list | length == 0
  no_log: true

- name: Update Komodo resource sync
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ komodo_port }}/write/UpdateResourceSync"
    method: POST
    body_format: json
    body:
      id: "{{ komodo_resource_sync_name }}"
      config:
        repo: "{{ komodo_resource_sync_repo }}"
        branch: "{{ komodo_resource_sync_branch }}"
        resource_path: "{{ komodo_resource_sync_paths }}"
    headers:
      X-Api-Key: "{{ lookup('ansible.builtin.env', 'KOMODO_API_KEY') }}"
      X-Api-Secret: "{{ lookup('ansible.builtin.env', 'KOMODO_API_SECRET') }}"
    status_code: 200
  when: not ansible_check_mode
  no_log: true

- name: Ensure Komodo uses connected Periphery server
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ komodo_port }}/write/UpdateServer"
    method: POST
    body_format: json
    body:
      id: "{{ komodo_managed_server_name }}"
      config:
        address: ""
        enabled: true
    headers:
      X-Api-Key: "{{ lookup('ansible.builtin.env', 'KOMODO_API_KEY') }}"
      X-Api-Secret: "{{ lookup('ansible.builtin.env', 'KOMODO_API_SECRET') }}"
    status_code: 200
  when: not ansible_check_mode
  no_log: true

- name: List Komodo variables
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ komodo_port }}/read/ListVariables"
    method: POST
    body_format: json
    body: {}
    headers:
      X-Api-Key: "{{ lookup('ansible.builtin.env', 'KOMODO_API_KEY') }}"
      X-Api-Secret: "{{ lookup('ansible.builtin.env', 'KOMODO_API_SECRET') }}"
    status_code: 200
  register: komodo_variables
  when: not ansible_check_mode
  no_log: true

- name: Create Komodo Technitium hostname variables
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ komodo_port }}/write/CreateVariable"
    method: POST
    body_format: json
    body:
      name: "{{ hostvars[item].technitium_node_env_var }}"
      value: "{{ item }}"
      description: "Ansible-managed Swarm hostname for {{ hostvars[item].technitium_node_env_var }}."
      is_secret: false
    headers:
      X-Api-Key: "{{ lookup('ansible.builtin.env', 'KOMODO_API_KEY') }}"
      X-Api-Secret: "{{ lookup('ansible.builtin.env', 'KOMODO_API_SECRET') }}"
    status_code: 200
  loop: "{{ groups['docker_swarm'] }}"
  when:
    - not ansible_check_mode
    - hostvars[item].technitium_node_env_var is defined
    - hostvars[item].technitium_node_env_var not in (komodo_variables.json | map(attribute='name') | list)
  no_log: true

- name: Update Komodo Technitium hostname variables
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ komodo_port }}/write/UpdateVariableValue"
    method: POST
    body_format: json
    body:
      name: "{{ hostvars[item].technitium_node_env_var }}"
      value: "{{ item }}"
    headers:
      X-Api-Key: "{{ lookup('ansible.builtin.env', 'KOMODO_API_KEY') }}"
      X-Api-Secret: "{{ lookup('ansible.builtin.env', 'KOMODO_API_SECRET') }}"
    status_code: 200
  loop: "{{ groups['docker_swarm'] }}"
  when:
    - not ansible_check_mode
    - hostvars[item].technitium_node_env_var is defined
  no_log: true

- name: Set monitoring stack host
  ansible.builtin.set_fact:
    komodo_monitoring_stack_host: "{{ item }}"
  loop: "{{ groups['docker_swarm'] }}"
  when: hostvars[item].monitoring_stack_host | default(false)

- name: Create Komodo Pulse hostname variable
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ komodo_port }}/write/CreateVariable"
    method: POST
    body_format: json
    body:
      name: PULSE_HOSTNAME
      value: "{{ komodo_monitoring_stack_host }}"
      description: "Ansible-managed Swarm hostname for Pulse."
      is_secret: false
    headers:
      X-Api-Key: "{{ lookup('ansible.builtin.env', 'KOMODO_API_KEY') }}"
      X-Api-Secret: "{{ lookup('ansible.builtin.env', 'KOMODO_API_SECRET') }}"
    status_code: 200
  when:
    - not ansible_check_mode
    - komodo_monitoring_stack_host is defined
    - "'PULSE_HOSTNAME' not in (komodo_variables.json | map(attribute='name') | list)"
  no_log: true

- name: Update Komodo Pulse hostname variable
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ komodo_port }}/write/UpdateVariableValue"
    method: POST
    body_format: json
    body:
      name: PULSE_HOSTNAME
      value: "{{ komodo_monitoring_stack_host }}"
    headers:
      X-Api-Key: "{{ lookup('ansible.builtin.env', 'KOMODO_API_KEY') }}"
      X-Api-Secret: "{{ lookup('ansible.builtin.env', 'KOMODO_API_SECRET') }}"
    status_code: 200
  when:
    - not ansible_check_mode
    - komodo_monitoring_stack_host is defined
  no_log: true

- name: Refresh Komodo resource sync
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ komodo_port }}/write/RefreshResourceSyncPending"
    method: POST
    body_format: json
    body:
      sync: "{{ komodo_resource_sync_name }}"
    headers:
      X-Api-Key: "{{ lookup('ansible.builtin.env', 'KOMODO_API_KEY') }}"
      X-Api-Secret: "{{ lookup('ansible.builtin.env', 'KOMODO_API_SECRET') }}"
    status_code: 200
  when:
    - not ansible_check_mode
    - komodo_run_resource_sync
  no_log: true

- name: Run Komodo resource sync
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ komodo_port }}/execute/RunSync"
    method: POST
    body_format: json
    body:
      sync: "{{ komodo_resource_sync_name }}"
    headers:
      X-Api-Key: "{{ lookup('ansible.builtin.env', 'KOMODO_API_KEY') }}"
      X-Api-Secret: "{{ lookup('ansible.builtin.env', 'KOMODO_API_SECRET') }}"
    status_code: 200
  when:
    - not ansible_check_mode
    - komodo_run_resource_sync
  no_log: true
