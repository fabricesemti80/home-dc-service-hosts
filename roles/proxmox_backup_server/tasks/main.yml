---
- name: Install Proxmox Backup Server repository key
  ansible.builtin.get_url:
    url: https://enterprise.proxmox.com/debian/proxmox-release-trixie.gpg
    dest: /etc/apt/trusted.gpg.d/proxmox-release-trixie.gpg
    mode: "0644"

- name: Configure Proxmox Backup Server no-subscription repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/pbs-no-subscription.list
    mode: "0644"
    content: |
      deb http://download.proxmox.com/debian/pbs trixie pbs-no-subscription

- name: Disable Proxmox Backup Server enterprise repository
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/pbs-enterprise.sources
    state: absent

- name: Install Proxmox Backup Server
  ansible.builtin.apt:
    name: proxmox-backup-server
    state: present
    update_cache: true
  environment:
    DEBIAN_FRONTEND: noninteractive
    IFUPDOWN2_NO_IFRELOAD: "1"

- name: Start Proxmox Backup Server proxy
  ansible.builtin.service:
    name: proxmox-backup-proxy
    state: started
    enabled: true

- name: Read Proxmox Backup Server certificate fingerprint
  ansible.builtin.command: proxmox-backup-manager cert info
  register: pbs_cert_info
  changed_when: false

- name: Show Proxmox Backup Server connection details
  ansible.builtin.debug:
    msg:
      - "Open https://{{ ansible_host | default(inventory_hostname) }}:8007/ and sign in with the root account."
      - "Fingerprint: {{ pbs_cert_info.stdout | regex_search('(?:[0-9a-f]{2}:){31}[0-9a-f]{2}') }}"
