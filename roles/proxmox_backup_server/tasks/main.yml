---
- name: Install Proxmox Backup Server repository key
  ansible.builtin.get_url:
    url: https://enterprise.proxmox.com/debian/proxmox-release-trixie.gpg
    dest: /etc/apt/trusted.gpg.d/proxmox-release-trixie.gpg
    mode: "0644"

- name: Configure Proxmox Backup Server no-subscription repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/pbs-no-subscription.list
    mode: "0644"
    content: |
      deb http://download.proxmox.com/debian/pbs trixie pbs-no-subscription

- name: Disable Proxmox Backup Server enterprise repository
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/pbs-enterprise.sources
    state: absent

- name: Install Proxmox Backup Server
  ansible.builtin.apt:
    name: proxmox-backup-server
    state: present
    update_cache: true
  environment:
    DEBIAN_FRONTEND: noninteractive
    IFUPDOWN2_NO_IFRELOAD: "1"

- name: Start Proxmox Backup Server proxy
  ansible.builtin.service:
    name: proxmox-backup-proxy
    state: started
    enabled: true

- name: Read Proxmox Backup Server certificate fingerprint
  ansible.builtin.command: proxmox-backup-manager cert info
  register: pbs_cert_info
  changed_when: false

- name: Show Proxmox Backup Server connection details
  ansible.builtin.debug:
    msg:
      - "Open https://{{ ansible_host | default(inventory_hostname) }}:8007/ and sign in with the root account."
      - "Fingerprint: {{ pbs_cert_info.stdout | regex_search('(?:[0-9a-f]{2}:){31}[0-9a-f]{2}') }}"

- name: Check PBS prune jobs
  ansible.builtin.command: proxmox-backup-manager prune-job show {{ item.id }} --output-format json
  register: pbs_prune_job_status
  changed_when: false
  failed_when: false
  run_once: true
  loop: "{{ pbs_prune_jobs | default([]) }}"
  loop_control:
    label: "{{ item.id }}"

- name: Configure PBS prune jobs
  ansible.builtin.command: >-
    proxmox-backup-manager {{ 'prune-job update' if item.rc == 0 else 'prune-job create' }}
    {{ item.item.id }}
    --schedule {{ item.item.schedule | quote }}
    --store {{ item.item.store | quote }}
    --comment {{ item.item.comment | quote }}
    --keep-daily {{ item.item.keep_daily }}
    --keep-weekly {{ item.item.keep_weekly }}
    --keep-monthly {{ item.item.keep_monthly }}
    --keep-yearly {{ item.item.keep_yearly }}
  changed_when: item.rc != 0
  run_once: true
  loop: "{{ pbs_prune_job_status.results | default([]) }}"
  loop_control:
    label: "{{ item.item.id }}"
  when: pbs_prune_jobs | default([]) | length > 0

- name: Check PBS verify jobs
  ansible.builtin.command: proxmox-backup-manager verify-job show {{ item.id }} --output-format json
  register: pbs_verify_job_status
  changed_when: false
  failed_when: false
  run_once: true
  loop: "{{ pbs_verify_jobs | default([]) }}"
  loop_control:
    label: "{{ item.id }}"

- name: Configure PBS verify jobs
  ansible.builtin.command: >-
    proxmox-backup-manager {{ 'verify-job update' if item.rc == 0 else 'verify-job create' }}
    {{ item.item.id }}
    --store {{ item.item.store | quote }}
    --schedule {{ item.item.schedule | quote }}
    --comment {{ item.item.comment | quote }}
    --outdated-after {{ item.item.outdated_after }}
    --ignore-verified {{ item.item.ignore_verified | int }}
    --max-depth {{ item.item.max_depth }}
    --read-threads {{ item.item.read_threads }}
    --verify-threads {{ item.item.verify_threads }}
  changed_when: item.rc != 0
  run_once: true
  loop: "{{ pbs_verify_job_status.results | default([]) }}"
  loop_control:
    label: "{{ item.item.id }}"
  when: pbs_verify_jobs | default([]) | length > 0
