[[swarm]]
name = "home-swarm"
tags = ["homelab"]

[swarm.config]
servers = ["sentinel-0"]

[[stack]]
name = "homelab-networking"
tags = ["homelab", "dns"]
deploy = true

[stack.config]
swarm = "home-swarm"
repo = "fabricesemti80/home-dc-service-hosts"
branch = "main"
file_paths = ["docker-stacks/networking/docker-compose.yml"]
environment = """
TAILSCALE_OAUTH_CLIENT_ID = [[TAILSCALE_OAUTH_CLIENT_ID]]
TAILSCALE_OAUTH_CLIENT_SECRET = [[TAILSCALE_OAUTH_CLIENT_SECRET]]
TECHNITIUM_ADMIN_PASSWORD = [[TECHNITIUM_ADMIN_PASSWORD]]
TECHNITIUM_NODE0_HOSTNAME = [[TECHNITIUM_NODE0_HOSTNAME]]
TECHNITIUM_NODE1_HOSTNAME = [[TECHNITIUM_NODE1_HOSTNAME]]
TECHNITIUM_NODE2_HOSTNAME = [[TECHNITIUM_NODE2_HOSTNAME]]
TECHNITIUM_NODE0_TOKEN = [[TECHNITIUM_NODE0_TOKEN]]
TECHNITIUM_NODE1_TOKEN = [[TECHNITIUM_NODE1_TOKEN]]
TECHNITIUM_NODE2_TOKEN = [[TECHNITIUM_NODE2_TOKEN]]
"""

[[stack]]
name = "homelab-monitoring"
tags = ["homelab", "monitoring"]
deploy = true

[stack.config]
swarm = "home-swarm"
repo = "fabricesemti80/home-dc-service-hosts"
branch = "main"
file_paths = ["docker-stacks/monitoring/docker-compose.yml"]
environment = """
PULSE_HOSTNAME = [[PULSE_HOSTNAME]]
PULSE_AGENT_URL = [[PULSE_AGENT_URL]]
"""

[[stack]]
name = "homelab-development"
tags = ["homelab", "development"]
deploy = true

[stack.config]
swarm = "home-swarm"
repo = "fabricesemti80/home-dc-service-hosts"
branch = "main"
file_paths = ["docker-stacks/development/docker-compose.yml"]
environment = """
KESTRA_HOSTNAME = [[KESTRA_HOSTNAME]]
KESTRA_BASIC_AUTH_USERNAME = [[KESTRA_BASIC_AUTH_USERNAME]]
KESTRA_BASIC_AUTH_PASSWORD = [[KESTRA_BASIC_AUTH_PASSWORD]]
KESTRA_POSTGRES_PASSWORD = [[KESTRA_POSTGRES_PASSWORD]]
KESTRA_SSH_PRIVATE_KEY_PATH = [[KESTRA_SSH_PRIVATE_KEY_PATH]]
KESTRA_FLOW_GIT_URL = [[KESTRA_FLOW_GIT_URL]]
KESTRA_FLOW_GIT_BRANCH = [[KESTRA_FLOW_GIT_BRANCH]]
KESTRA_FLOW_GIT_PATH = [[KESTRA_FLOW_GIT_PATH]]
KESTRA_FLOW_NAMESPACE = [[KESTRA_FLOW_NAMESPACE]]
HOMELAB_PVE_HOSTS = [[HOMELAB_PVE_HOSTS]]
HOMELAB_PVE_SHUTDOWN_ORDER = [[HOMELAB_PVE_SHUTDOWN_ORDER]]
HOMELAB_PBS_HOST = [[HOMELAB_PBS_HOST]]
HOMELAB_K8S_VMS = [[HOMELAB_K8S_VMS]]
HOMELAB_SERVICE_GUESTS = [[HOMELAB_SERVICE_GUESTS]]
"""

[[resource_sync]]
name = "home-dc-service-hosts"
tags = ["homelab"]

[resource_sync.config]
repo = "fabricesemti80/home-dc-service-hosts"
branch = "main"
resource_path = ["komodo/resources.toml"]
