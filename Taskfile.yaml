---
version: "3"

vars:
  TERRAFORM_IMAGE: hashicorp/terraform:1.15.7
  TF_DOCKER: >-
    docker run --rm
    -v {{.ROOT_DIR}}:/work
    -w /work
    -e TF_VAR_proxmox_endpoint
    -e TF_VAR_proxmox_insecure
    -e TF_VAR_proxmox_username
    -e TF_VAR_proxmox_password
    -e TF_VAR_root_ssh_public_keys
    {{.TERRAFORM_IMAGE}}

tasks:
  default:
    cmd: task --list

  tf:init:
    desc: Initialize Terraform using the Linux provider runtime
    cmd: sh -lc 'set -a; test ! -f .env || . ./.env; set +a; {{.TF_DOCKER}} -chdir=terraform init'
    preconditions:
      - which docker

  tf:fmt:
    desc: Format Terraform files
    cmd: terraform fmt -recursive terraform
    preconditions:
      - which terraform

  tf:plan:
    desc: Plan Proxmox guest changes
    cmd: sh -lc 'set -a; test ! -f .env || . ./.env; set +a; {{.TF_DOCKER}} -chdir=terraform plan -out=tfplan'
    preconditions:
      - which docker

  tf:apply:
    desc: Apply planned Proxmox guest changes
    cmd: sh -lc 'set -a; test ! -f .env || . ./.env; set +a; {{.TF_DOCKER}} -chdir=terraform apply tfplan'
    preconditions:
      - which docker
      - test -f terraform/tfplan

  ansible:check:
    desc: Check Ansible playbook syntax
    cmd: sh -lc 'set -a; test ! -f .env || . ./.env; set +a; cd ansible && ansible-playbook --syntax-check site.yml'
    preconditions:
      - which ansible-playbook

  ansible:apply:
    desc: Configure Proxmox guests with Ansible
    cmd: sh -lc 'set -a; test ! -f .env || . ./.env; set +a; cd ansible && ansible-playbook site.yml'
    preconditions:
      - which ansible-playbook
