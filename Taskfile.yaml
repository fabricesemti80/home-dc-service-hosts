version: "3"

tasks:
  default:
    cmd: task --list

  tf:init:
    desc: Initialize OpenTofu for the service-hosts stack
    cmd: sh -lc 'set -a; test ! -f .env || . ./.env; set +a; tofu -chdir=terraform init'
    preconditions:
      - which tofu

  tf:fmt:
    desc: Format Terraform/OpenTofu files
    cmd: tofu fmt -recursive terraform
    preconditions:
      - which tofu

  tf:plan:
    desc: Plan service host changes
    cmd: sh -lc 'set -a; test ! -f .env || . ./.env; set +a; tofu -chdir=terraform plan -out=tfplan'
    preconditions:
      - which tofu

  tf:apply:
    desc: Apply planned service host changes
    cmd: sh -lc 'set -a; test ! -f .env || . ./.env; set +a; tofu -chdir=terraform plan -out=tfplan && tofu -chdir=terraform apply tfplan'
    preconditions:
      - which tofu

  ansible:plan:
    desc: Plan Ansible changes
    cmd: sh -lc 'set -a; if [ -f .env ]; then . ./.env; elif [ -f "$HOME/Documents/repositories/infrastructure/home-dc-service-hosts/.env" ]; then . "$HOME/Documents/repositories/infrastructure/home-dc-service-hosts/.env"; fi; set +a; cd ansible && ansible-playbook --check --diff site.yml'
    preconditions:
      - which ansible-playbook

  ansible:apply:
    desc: Configure service hosts with Ansible
    cmd: sh -lc 'set -a; if [ -f .env ]; then . ./.env; elif [ -f "$HOME/Documents/repositories/infrastructure/home-dc-service-hosts/.env" ]; then . "$HOME/Documents/repositories/infrastructure/home-dc-service-hosts/.env"; fi; set +a; cd ansible && ansible-playbook site.yml'
    preconditions:
      - which ansible-playbook
